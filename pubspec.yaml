name: blogapp
description: A new Flutter project.
publish_to: none 
version: 1.0.4+4

environment:
  sdk: ">=3.0.1 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # HTML rendering
  flutter_widget_from_html: ^0.15.2
  flutter_widget_from_html_core: ^0.15.2
  flutter_html: ^3.0.0-beta.2
  
  # UI & Styling
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  flutter_screenutil: ^5.8.4
  flutter_svg: ^2.0.7
  cupertino_icons: ^1.0.2
  font_awesome_flutter: ^10.7.0
  loading_animation_widget: ^1.2.1
  lottie: ^3.1.2
  flutter_native_splash: ^2.4.0

  
  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.3
  provider: ^6.0.5
  get_it: ^8.0.0
  get: ^4.6.6
  
  # Navigation
  go_router: ^17.0.1
  app_links: ^6.3.2
  
  # Media & Video
  video_player: ^2.8.2
  chewie: 1.7.5
  audioplayers: ^6.1.0
  just_audio: ^0.9.34
  audio_service: ^0.18.10
  audio_video_progress_bar: ^2.0.1
  youtube_player_flutter: ^9.1.3
  pod_player: ^0.2.2
  youtube_explode_dart: ^2.2.1
  youtube_player_iframe: ^5.1.2
  
  # Images & Cache
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  palette_generator: ^0.3.3+2
  
  # Firebase
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  firebase_analytics: ^12.1.1
  firebase_in_app_messaging: ^0.9.0+6
  firebase_auth: ^6.1.4
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.0.1
  sign_in_with_apple: ^6.1.0
  twitter_login: ^4.4.1
  crypto: ^3.0.3
  
  # Database & Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  hive_generator: ^2.0.1
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  path_provider: ^2.1.1
  sqflite: ^2.3.2
  
  # Network & API
  http: ^1.2.1
  dio: ^5.3.3
  socket_io_client: ^2.0.2
  rxdart: ^0.28.0
  
  # Utilities
  intl: ^0.20.2
  dartz: ^0.10.1
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.2
  connectivity_plus: ^6.0.5
  battery_plus: ^6.2.0
  package_info_plus: ^9.0.0
  wakelock_plus: ^1.4.0
  url_launcher: ^6.1.14
  share_plus: ^10.0.2
  image_picker: ^1.0.4
  vibration: ^2.0.1
  path: ^1.9.0
  time: ^2.1.3
  
  # Ethiopian Calendar
  abushakir: ^1.0.0
  # ethiopian_calendar: ^0.0.2
  
  # UI Components
  extended_tabs: ^4.0.0
  expandable_text: ^2.3.0
  text_scroll: ^0.2.0
  custom_refresh_indicator: ^4.0.1
  scrollable_positioned_list: ^0.3.8
  tab_indicator_styler: ^2.0.0
  expandable: ^5.0.1
  dropdown_button2: ^2.3.9
  animate_do: ^3.0.2
  animated_text_kit: ^4.2.2
  like_button: ^2.0.5
  flutter_staggered_animations: ^1.1.1
  
  # Notifications
  flutter_local_notifications: ^20.0.0
  awesome_notifications: ^0.10.1
  
  # WebView
  flutter_inappwebview: ^6.0.0
  
  # Settings
  app_settings: ^5.1.1
  flutter_open_app_settings: ^0.1.4
  
  # Lints
  flutter_lints: ^3.0.1
  ethiopian_calendar_plus: ^1.0.6
  meta: ^1.17.0
  android_id: ^0.5.1
flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/countrycodes.json

  fonts:
    - family: AbyssinicaSIL-Regular
      fonts:
        - asset: assets/fonts/AbyssinicaSIL-Regular.ttf
    - family: klavika-bold
      fonts:
        - asset: assets/fonts/klavika-bold.otf
    - family: klavika-medium
      fonts:
        - asset: assets/fonts/klavika-medium.otf
    - family: InstagramSans
      fonts:
        - asset: assets/fonts/InstagramSans-Medium.ttf
        - asset: assets/fonts/InstagramSans-Bold.ttf

dev_dependencies:
  dart_code_metrics_presets: ^1.8.0
